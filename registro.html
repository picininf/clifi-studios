<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CLIFI STUDIOS | Registro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.44.0/dist/umd/supabase.js"></script>
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0b0b0b; color: white; font-family: sans-serif; }
        .card { background: #161616; padding: 40px; border-radius: 8px; width: 320px; text-align: center; border: 1px solid #222; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background: #E63900; color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        a { display: block; margin-top: 15px; color: #777; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>CLIFI_REGISTRO</h2>
        <form id="form-registro">
            <input type="text" id="reg-nome" required placeholder="Nome Completo">
            <input type="email" id="reg-email" required placeholder="E-mail">
            <input type="password" id="reg-senha" required placeholder="Senha (mínimo 6 caracteres)">
            <button type="button" onclick="executarRegistro()">Criar Conta</button>
        </form>
        <a href="login.html">Já tem conta? Login</a>
        <a href="index.html">← Voltar para o Início</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
