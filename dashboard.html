<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CLIFI | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.44.0/dist/umd/supabase.js"></script>
    <style>
        body { background: #0b0b0b; color: white; padding: 40px; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .card { background: #161616; padding: 20px; border: 1px solid #222; border-radius: 8px; }
        .card h2 { color: #E63900; margin: 5px 0 0 0; font-size: 32px; }
        table { width: 100%; border-collapse: collapse; background: #161616; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #222; text-align: left; }
        th { background: #222; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>CLIFI_DASHBOARD</h1>
        <a href="index.html" style="color:white; text-decoration:none; border:1px solid #E63900; padding:8px 15px; border-radius:4px;">Voltar ao Site</a>
    </div>
    <div class="grid">
        <div class="card"><h3>Faturamento do Mês</h3><h2 id="dash-faturamento">R$ 0,00</h2></div>
        <div class="card"><h3>Total de Vendas</h3><h2 id="dash-vendas">0 clipes</h2></div>
    </div>
    <h2>Histórico de Vendas</h2>
    <table>
        <thead><tr><th>Cliente</th><th>E-mail</th><th>Serviço</th><th>Data</th><th>Hora</th><th>Valor</th></tr></thead>
        <tbody id="tabela-vendas-corpo">
            <tr><td colspan="6" style="text-align:center; color:#666;">Carregando histórico do banco...</td></tr>
        </tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
